# Next.js en Netlify
# Con publish=.next la raíz del deploy es .next, así que los estáticos quedan en /static/.
# Next pide /_next/static/ → reescribir para que funcionen.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

# Sirve /_next/static/* desde /static/* (mismo contenido cuando publish=.next)
[[redirects]]
  from = "/_next/static/*"
  to = "/static/:splat"
  status = 200
  force = true
